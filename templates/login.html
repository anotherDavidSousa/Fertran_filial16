{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Filial 16</title>
    <link rel="stylesheet" href="{% static 'fila/css/login.css' %}">
</head>
<body class="login-page">
    <div class="login-backdrop"></div>
    <div class="login-box">
        <img src="{% static 'fila/images/fertran-logo.png' %}" alt="Fertran" class="login-logo">
        <h1 class="login-title">Filial 16</h1>
        <p class="login-subtitle">Fila de carregamento</p>

        {% if form.non_field_errors %}
        <ul class="login-errors">
            {% for error in form.non_field_errors %}
            <li>{{ error }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form method="post" action="{% url 'login' %}" class="login-form">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">
            <div class="form-group">
                <label for="id_username">Login</label>
                <input type="text" name="username" id="id_username" autofocus autocomplete="username" required placeholder="Usuário">
            </div>
            <div class="form-group">
                <label for="id_password">Senha</label>
                <input type="password" name="password" id="id_password" autocomplete="current-password" required placeholder="Senha">
            </div>
            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <div class="login-links">
            <a href="{% url 'esqueci_senha' %}">Esqueceu a senha?</a>
            <a href="{% url 'solicitar_acesso' %}">Solicitar acesso ao administrador</a>
        </div>
    </div>
</body>
</html>
