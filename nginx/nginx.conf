events {}
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─────────────────────────────────────────
    # Django — agregamentoipatinga.com
    # ─────────────────────────────────────────
    server {
        listen 80;
        server_name agregamentoipatinga.com www.agregamentoipatinga.com;

        location /static/ {
            alias /var/www/static/;
        }

        # Webhook: preserve POST method on trailing-slash redirect
        location = /wpp/api/webhook {
            return 308 https://$host/wpp/api/webhook/;
        }

        location / {
            proxy_pass http://filial16-web:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
        }
    }

    # ─────────────────────────────────────────
    # n8n — n8n.agregamentoipatinga.com
    # ─────────────────────────────────────────
    server {
        listen 80;
        server_name n8n.agregamentoipatinga.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name n8n.agregamentoipatinga.com;
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        location / {
            proxy_pass http://n8n:5678;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # ─────────────────────────────────────────
    # Chatwoot — chat.agregamentoipatinga.com
    # ─────────────────────────────────────────
    server {
        listen 80;
        server_name chat.agregamentoipatinga.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name chat.agregamentoipatinga.com;
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # Tamanho máximo de upload (imagens, arquivos enviados no chat)
        client_max_body_size 50M;

        # WebSocket — necessário para mensagens em tempo real
        location /cable {
            proxy_pass http://chatwoot-web:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://chatwoot-web:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}