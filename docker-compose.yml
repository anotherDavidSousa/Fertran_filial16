# Credenciais: em produção crie .env a partir de .env.example e rode:
#   docker compose --env-file .env up -d
# Sem .env, os valores padrão abaixo são usados (apenas desenvolvimento).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-filial16}
      POSTGRES_USER: ${POSTGRES_USER:-filial16}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-filial16}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - filial16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U filial16 -d filial16"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput --clear &&
             gunicorn filial16.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 4 --worker-class gthread --timeout 300 --graceful-timeout 300 --preload"
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${POSTGRES_DB:-filial16}
      POSTGRES_USER: ${POSTGRES_USER:-filial16}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-filial16}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-*}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-filial16}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-filial16minio}
      MINIO_BUCKET: ${MINIO_BUCKET:-filial16}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-0}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-change-in-production}
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - filial16

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - static_volume:/var/www/static:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
    networks:
      - filial16

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-filial16}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-filial16minio}
    volumes:
      - minio_data:/data
    # Exposto em 0.0.0.0 para acesso na rede doméstica (n8n em outro PC)
    ports:
      - "0.0.0.0:9000:9000"
      - "0.0.0.0:9001:9001"
    networks:
      - filial16

volumes:
  pgdata:
  static_volume:
  minio_data:

networks:
  filial16:
    driver: bridge
