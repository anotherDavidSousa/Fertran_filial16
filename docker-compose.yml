services:
  web:
    build: .
    container_name: filial16-web
    restart: always
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput --clear &&
             gunicorn filial16.wsgi:application --bind 0.0.0.0:8000 --workers 2 --threads 4 --worker-class gthread --timeout 300 --graceful-timeout 300 --preload"
    environment:
      POSTGRES_HOST: shared-postgres
      POSTGRES_DB: ${DJANGO_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DJANGO_DEBUG: 0
      ALLOWED_HOSTS: agregamentoipatinga.com,www.agregamentoipatinga.com,filial16-web,localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: https://agregamentoipatinga.com,https://www.agregamentoipatinga.com
      MINIO_ENDPOINT: filial16-minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_USE_SSL: 0
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      UAZAPI_BASE_URL: ${UAZAPI_BASE_URL:-}
      UAZAPI_WEBHOOK_SECRET: ${UAZAPI_WEBHOOK_SECRET:-}
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    expose:
      - "8000"
    depends_on:
      - minio
    networks:
      - shared-network

  nginx:
    image: nginx:alpine
    container_name: filial16-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_volume:/var/www/static:ro
    depends_on:
      - web
    networks:
      - shared-network

  minio:
    image: minio/minio:latest
    container_name: filial16-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - ./minio/data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    networks:
      - shared-network

volumes:
  static_volume:

networks:
  shared-network:
    external: true
